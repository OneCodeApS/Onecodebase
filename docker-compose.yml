services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Headroom over the combined pools (dashboard 30 + PostgREST 30 + ad-hoc
    # admin connections). 150 fits within the 2 GB recommended RAM — each
    # backend costs ~10 MB. Bump to ~300 once PgBouncer is in front.
    command:
      - "postgres"
      - "-c"
      - "max_connections=150"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      # Forwarded so init scripts can interpolate them.
      AUTHENTICATOR_PASSWORD: ${AUTHENTICATOR_PASSWORD:?AUTHENTICATOR_PASSWORD must be set}
      DASHBOARD_ADMIN_PASSWORD: ${DASHBOARD_ADMIN_PASSWORD:?DASHBOARD_ADMIN_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      # Bound to loopback only — for local psql access. Remove in prod.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  # Connection pooler in transaction mode. Lets PostgREST and the dashboard
  # multiplex many client connections onto a smaller, configurable number of
  # actual Postgres backends — important once traffic grows past a couple
  # hundred concurrent users. Realtime SSE bypasses this (it needs session
  # state for LISTEN), connecting directly to postgres:5432.
  pgbouncer:
    build:
      context: ./pgbouncer
    restart: unless-stopped
    environment:
      AUTHENTICATOR_PASSWORD: ${AUTHENTICATOR_PASSWORD:?AUTHENTICATOR_PASSWORD must be set}
      DASHBOARD_ADMIN_PASSWORD: ${DASHBOARD_ADMIN_PASSWORD:?DASHBOARD_ADMIN_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "30"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # PgBouncer accepts plain TCP — a successful connect is enough.
      test: ["CMD-SHELL", "nc -z localhost 6432 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend

  postgrest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    environment:
      # Routes via PgBouncer so PostgREST traffic is multiplexed too.
      PGRST_DB_URI: postgres://authenticator:${AUTHENTICATOR_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET:?PGRST_JWT_SECRET must be set}
      PGRST_OPENAPI_SERVER_PROXY_URI: ${API_PUBLIC_URL:-http://api.localhost}
      PGRST_DB_POOL: "30"
      # PostgREST sets some startup params PgBouncer would otherwise reject.
      # The pooler's ignore_startup_parameters covers extra_float_digits; this
      # disables PostgREST's prepared-statement use so transaction-pooled
      # connections can be reused freely.
      PGRST_DB_PREPARED_STATEMENTS: "false"
      # PostgREST's schema-cache reload uses LISTEN on the `pgrst` channel,
      # which doesn't survive transaction-pooled connections. Disable it —
      # schema changes require a `docker compose restart postgrest` instead.
      PGRST_DB_CHANNEL_ENABLED: "false"
    depends_on:
      pgbouncer:
        condition: service_healthy
    networks:
      - backend

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_PUBLIC_URL:-http://files.localhost}
    volumes:
      - minio-data:/data
    ports:
      # Bound to loopback only — for `npm run dev` outside Docker to reach MinIO.
      # In prod the dashboard container talks to `minio:9000` over the internal
      # network and this mapping is irrelevant.
      - "127.0.0.1:9000:9000"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # General queries go through PgBouncer (transaction-pooled).
      DATABASE_URL: postgres://dashboard_admin:${DASHBOARD_ADMIN_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-postgres}
      # Realtime LISTEN/NOTIFY needs a session-pinned connection, so it skips
      # PgBouncer entirely and talks straight to Postgres.
      REALTIME_DATABASE_URL: postgres://dashboard_admin:${DASHBOARD_ADMIN_PASSWORD}@postgres:5432/${POSTGRES_DB:-postgres}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
      # Shared with PostgREST so JWTs signed here verify there and vice versa.
      # Used by /auth/v1/* (signing user tokens), /realtime (auth), and the
      # edge-function gate at /functions/v1/* (when verify_jwt is on).
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET:?PGRST_JWT_SECRET must be set}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      DASHBOARD_PUBLIC_URL: ${DASHBOARD_PUBLIC_URL:-http://dashboard.localhost}
      AUDIT_LOG_DIR: /audit
    volumes:
      # Host path for the file-based audit log. The admin chooses the
      # subdirectory under this mount in the dashboard.
      - ${AUDIT_HOST_PATH:-./audit-logs}:/audit
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    networks:
      - backend

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      API_HOST: ${API_HOST:-api.localhost}
      DASHBOARD_HOST: ${DASHBOARD_HOST:-dashboard.localhost}
      FILES_HOST: ${FILES_HOST:-files.localhost}
      CADDY_TLS: ${CADDY_TLS:-internal}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - postgrest
      - dashboard
      - minio
    networks:
      - backend

volumes:
  postgres-data:
  minio-data:
  caddy-data:
  caddy-config:

networks:
  backend:
    driver: bridge
