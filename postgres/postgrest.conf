# PostgREST configuration (reference).
#
# In docker-compose the live config comes from PGRST_* environment variables,
# not this file. This file documents the equivalent settings and exists so you
# can switch to file-based config by mounting it at /etc/postgrest.conf and
# setting `PGRST_CONFIG_FILE=/etc/postgrest.conf` on the postgrest service.

db-uri        = "postgres://authenticator:CHANGE_ME@postgres:5432/postgres"
db-schemas    = "public"
db-anon-role  = "anon"
db-pool       = 10

# Symmetric secret used to verify JWTs. Same value as PGRST_JWT_SECRET in .env.
jwt-secret    = "CHANGE_ME_AT_LEAST_32_CHARS"

# Public URL of the API (used in the OpenAPI spec).
openapi-server-proxy-uri = "http://api.localhost"
