name: Build & Release

# One workflow handles both casual rebuilds and version releases.
#
# Triggers:
#   - push to main         → rebuild :latest + :<short-sha>
#   - workflow_dispatch    → manual run from the Actions tab:
#       release_type=none  → same as a main push (rebuild only)
#       release_type=patch → compute next x.y.(z+1), build, tag, release
#       release_type=minor → compute next x.(y+1).0, build, tag, release
#       release_type=major → compute next (x+1).0.0, build, tag, release
#
# Note: tag creation via GITHUB_TOKEN does not fire other workflows
# (GitHub's anti-loop protection), so there's no double-build to worry about.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type — pick "none" to just rebuild the image'
        type: choice
        options: [none, patch, minor, major]
        default: none

permissions:
  contents: write   # create git tag + GitHub Release
  packages: write   # push image to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/onecodebase-dashboard

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      is_release: ${{ steps.bump.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can read existing tags

      - name: Decide what we're doing
        id: bump
        env:
          RELEASE_TYPE: ${{ inputs.release_type || 'none' }}
        run: |
          if [ "$RELEASE_TYPE" = "none" ]; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Rebuild only — no release."
            exit 0
          fi

          # Refuse to release from a non-default branch.
          if [ "${{ github.ref }}" != "refs/heads/master" ]; then
            echo "::error::Releases must run from master. Current ref: ${{ github.ref }}"
            exit 1
          fi

          # Find the latest semver tag (sorted by version, not lex).
          LATEST=$(git tag --list "v[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            MAJOR=0; MINOR=0; PATCH=0
            echo "No existing semver tags; this will be the first release."
          else
            VERSION="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            echo "Latest tag: $LATEST"
          fi

          case "$RELEASE_TYPE" in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            *) echo "::error::Unknown release_type: $RELEASE_TYPE"; exit 1 ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"
          MAJOR_MINOR="${MAJOR}.${MINOR}"

          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "::error::Computed tag $NEW_TAG already exists. Something is off."
            exit 1
          fi

          {
            echo "is_release=true"
            echo "version=$NEW_VERSION"
            echo "tag=$NEW_TAG"
            echo "major_minor=$MAJOR_MINOR"
          } >> "$GITHUB_OUTPUT"

          echo "Computed next version: $NEW_VERSION ($RELEASE_TYPE bump)"

      - name: Extract CHANGELOG notes for this version
        if: steps.bump.outputs.is_release == 'true'
        id: notes
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          NOTES=$(awk -v ver="$VERSION" '
            BEGIN { needle = "## [" ver "]" }
            index($0, needle) == 1 { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$(echo "$NOTES" | tr -d "[:space:]")" ]; then
            echo "::error::No '## [$VERSION]' section in CHANGELOG.md — add the entry before releasing."
            exit 1
          fi
          {
            echo "notes<<EOF_NOTES"
            echo "$NOTES"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: tags
        env:
          IS_RELEASE: ${{ steps.bump.outputs.is_release }}
          VERSION: ${{ steps.bump.outputs.version }}
          MAJOR_MINOR: ${{ steps.bump.outputs.major_minor }}
        run: |
          # GHCR requires lowercase repository names; GitHub org names can have
          # mixed case (e.g. OneCodeApS), so we lowercase the whole path here.
          IMG=$(echo "${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS="${IMG}:latest,${IMG}:${SHORT_SHA}"
          if [ "$IS_RELEASE" = "true" ]; then
            TAGS="${TAGS},${IMG}:${VERSION},${IMG}:${MAJOR_MINOR}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Image tags to publish: $TAGS"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create git tag and GitHub Release
        if: steps.bump.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.bump.outputs.tag }}
          NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "$TAG" \
            --notes "$NOTES"

      - name: Summary
        env:
          IS_RELEASE: ${{ steps.bump.outputs.is_release }}
          VERSION: ${{ steps.bump.outputs.version }}
          TAG: ${{ steps.bump.outputs.tag }}
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          {
            if [ "$IS_RELEASE" = "true" ]; then
              echo "### Released $TAG"
            else
              echo "### Image rebuilt"
            fi
            echo ""
            echo "**Tags pushed:**"
            echo '```'
            echo "$TAGS" | tr ',' '\n'
            echo '```'
            if [ "$IS_RELEASE" = "true" ]; then
              echo ""
              echo "**Deploy on the server:**"
              echo '```bash'
              echo "cd /opt/onecodebase && ./scripts/deploy.sh $VERSION"
              echo '```'
              echo ""
              echo "**Release page:** ${{ github.server_url }}/${{ github.repository }}/releases/tag/$TAG"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
